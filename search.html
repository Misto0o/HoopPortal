<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scout The Talent - HoopPortal</title>
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/search.css">
    <link rel="stylesheet" href="/css/modals.css">
    <link rel="stylesheet" href="/extras/navbar.css">
</head>
<body>
    <!-- Navigation will be loaded here by navbar.js -->

    <!-- SEARCH SECTION -->
    <section class="search-section">
        <div class="section-container">
            <div class="search-header">
                <h1>SCOUT THE TALENT</h1>
                <p>Filter by state, city, position, and class year to find your next recruit.</p>
            </div>

            <!-- Filter Box -->
            <div class="search-filters">
                <div class="filter-group">
                    <label>Player Name</label>
                    <input type="text" id="filterPlayerName" placeholder="Search by name...">
                </div>

                <div class="filter-group">
                    <label>Gender</label>
                    <select id="filterGender">
                        <option value="">All Genders</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>City</label>
                    <input type="text" id="filterCity" placeholder="Enter city...">
                </div>

                <div class="filter-group">
                    <label>State</label>
                    <select id="filterState">
                        <option value="">All States</option>
                        <option value="AL">Alabama</option>
                        <option value="AK">Alaska</option>
                        <option value="AZ">Arizona</option>
                        <option value="AR">Arkansas</option>
                        <option value="CA">California</option>
                        <option value="CO">Colorado</option>
                        <option value="CT">Connecticut</option>
                        <option value="DE">Delaware</option>
                        <option value="FL">Florida</option>
                        <option value="GA">Georgia</option>
                        <option value="HI">Hawaii</option>
                        <option value="ID">Idaho</option>
                        <option value="IL">Illinois</option>
                        <option value="IN">Indiana</option>
                        <option value="IA">Iowa</option>
                        <option value="KS">Kansas</option>
                        <option value="KY">Kentucky</option>
                        <option value="LA">Louisiana</option>
                        <option value="ME">Maine</option>
                        <option value="MD">Maryland</option>
                        <option value="MA">Massachusetts</option>
                        <option value="MI">Michigan</option>
                        <option value="MN">Minnesota</option>
                        <option value="MS">Mississippi</option>
                        <option value="MO">Missouri</option>
                        <option value="MT">Montana</option>
                        <option value="NE">Nebraska</option>
                        <option value="NV">Nevada</option>
                        <option value="NH">New Hampshire</option>
                        <option value="NJ">New Jersey</option>
                        <option value="NM">New Mexico</option>
                        <option value="NY">New York</option>
                        <option value="NC">North Carolina</option>
                        <option value="ND">North Dakota</option>
                        <option value="OH">Ohio</option>
                        <option value="OK">Oklahoma</option>
                        <option value="OR">Oregon</option>
                        <option value="PA">Pennsylvania</option>
                        <option value="RI">Rhode Island</option>
                        <option value="SC">South Carolina</option>
                        <option value="SD">South Dakota</option>
                        <option value="TN">Tennessee</option>
                        <option value="TX">Texas</option>
                        <option value="UT">Utah</option>
                        <option value="VT">Vermont</option>
                        <option value="VA">Virginia</option>
                        <option value="WA">Washington</option>
                        <option value="WV">West Virginia</option>
                        <option value="WI">Wisconsin</option>
                        <option value="WY">Wyoming</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Position</label>
                    <select id="filterPosition">
                        <option value="">All Positions</option>
                        <option value="PG">Point Guard (PG)</option>
                        <option value="CG">Combo Guard (CG)</option>
                        <option value="SG">Shooting Guard (SG)</option>
                        <option value="SF">Small Forward (SF)</option>
                        <option value="PF">Power Forward (PF)</option>
                        <option value="C">Center (C)</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Class Year</label>
                    <select id="filterClassYear">
                        <option value="">All Years</option>
                        <option value="2027">Class of 2027</option>
                        <option value="2028">Class of 2028</option>
                        <option value="2029">Class of 2029</option>
                        <option value="2030">Class of 2030</option>
                        <option value="2031">Class of 2031</option>
                        <option value="2032">Class of 2032</option>
                        <option value="2033">Class of 2033</option>
                        <option value="2034">Class of 2034</option>
                        <option value="2035">Class of 2035</option>
                    </select>
                </div>

                <button class="btn btn-primary" id="searchBtn">Search</button>
                <button class="btn btn-secondary" id="resetBtn">Reset Filters</button>
            </div>

            <!-- Results Section -->
            <div class="search-results">
                <div class="results-header">
                    <h2>Available Prospects</h2>
                    <p class="premium-notice">⭐ Premium players shown first</p>
                </div>

                <div id="searchProspectsContainer" class="prospects-list">
                    <!-- Populated by JavaScript -->
                </div>
            </div>
        </div>
    </section>

    <!-- Modals -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <div id="playerModal" class="modal">
        <div class="modal-content modal-large">
            <button class="modal-close">&times;</button>
            <div id="playerModalBody"></div>
        </div>
    </div>

    <script src="/extras/navbar.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
