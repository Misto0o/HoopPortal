<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - HoopPortal</title>
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/navigation.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/profile.css">
    <link rel="stylesheet" href="/css/utilities.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">HOOPPORTAL</a>
            <div class="nav-menu" id="navMenu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="search.html" class="nav-link">Search Players</a>
                <a href="plans.html" class="nav-link">Plans</a>
                <button class="nav-btn nav-btn-login" id="loginBtn">Log In</button>
                <button class="nav-btn nav-btn-signup" id="signupBtn">Sign Up</button>
            </div>
        </div>
    </nav>

    <!-- PROFILE SECTION -->
    <section class="profile-section">
        <div class="section-container">
            <h1>My Player Profile</h1>

            <div class="profile-container">
                <!-- Basic Info Form -->
                <div class="profile-card">
                    <h2>Basic Information</h2>
                    <form id="basicInfoForm" class="profile-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label>First Name *</label>
                                <input type="text" id="firstName" required>
                            </div>
                            <div class="form-group">
                                <label>Last Name *</label>
                                <input type="text" id="lastName" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>Height *</label>
                                <input type="text" id="height" placeholder="e.g., 6'2\"" required>
                            </div>
                            <div class="form-group">
                                <label>Weight (lbs) *</label>
                                <input type="number" id="weight" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>Position *</label>
                                <select id="position" required>
                                    <option value="">Select Position</option>
                                    <option value="PG">Point Guard (PG)</option>
                                    <option value="SG">Shooting Guard (SG)</option>
                                    <option value="SF">Small Forward (SF)</option>
                                    <option value="PF">Power Forward (PF)</option>
                                    <option value="C">Center (C)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Class Year *</label>
                                <select id="classYear" required>
                                    <option value="">Select Class</option>
                                    <option value="2025">Class of 2025</option>
                                    <option value="2026">Class of 2026</option>
                                    <option value="2027">Class of 2027</option>
                                    <option value="2028">Class of 2028</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>GPA</label>
                                <input type="number" id="gpa" min="0" max="4" step="0.1" placeholder="3.5">
                            </div>
                            <div class="form-group">
                                <label>School</label>
                                <input type="text" id="school" placeholder="Your high school name">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>City *</label>
                                <input type="text" id="city" required>
                            </div>
                            <div class="form-group">
                                <label>State *</label>
                                <select id="state" required>
                                    <option value="">Select State</option>
                                    <option value="AL">Alabama</option>
                                    <option value="AK">Alaska</option>
                                    <option value="AZ">Arizona</option>
                                    <option value="AR">Arkansas</option>
                                    <option value="CA">California</option>
                                    <option value="CO">Colorado</option>
                                    <option value="CT">Connecticut</option>
                                    <option value="DE">Delaware</option>
                                    <option value="FL">Florida</option>
                                    <option value="GA">Georgia</option>
                                    <option value="HI">Hawaii</option>
                                    <option value="ID">Idaho</option>
                                    <option value="IL">Illinois</option>
                                    <option value="IN">Indiana</option>
                                    <option value="IA">Iowa</option>
                                    <option value="KS">Kansas</option>
                                    <option value="KY">Kentucky</option>
                                    <option value="LA">Louisiana</option>
                                    <option value="ME">Maine</option>
                                    <option value="MD">Maryland</option>
                                    <option value="MA">Massachusetts</option>
                                    <option value="MI">Michigan</option>
                                    <option value="MN">Minnesota</option>
                                    <option value="MS">Mississippi</option>
                                    <option value="MO">Missouri</option>
                                    <option value="MT">Montana</option>
                                    <option value="NE">Nebraska</option>
                                    <option value="NV">Nevada</option>
                                    <option value="NH">New Hampshire</option>
                                    <option value="NJ">New Jersey</option>
                                    <option value="NM">New Mexico</option>
                                    <option value="NY">New York</option>
                                    <option value="NC">North Carolina</option>
                                    <option value="ND">North Dakota</option>
                                    <option value="OH">Ohio</option>
                                    <option value="OK">Oklahoma</option>
                                    <option value="OR">Oregon</option>
                                    <option value="PA">Pennsylvania</option>
                                    <option value="RI">Rhode Island</option>
                                    <option value="SC">South Carolina</option>
                                    <option value="SD">South Dakota</option>
                                    <option value="TN">Tennessee</option>
                                    <option value="TX">Texas</option>
                                    <option value="UT">Utah</option>
                                    <option value="VT">Vermont</option>
                                    <option value="VA">Virginia</option>
                                    <option value="WA">Washington</option>
                                    <option value="WV">West Virginia</option>
                                    <option value="WI">Wisconsin</option>
                                    <option value="WY">Wyoming</option>
                                </select>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary">Save Basic Info</button>
                    </form>
                </div>

                <!-- Game Description -->
                <div class="profile-card">
                    <h2>About Your Game</h2>
                    <form id="gameDescriptionForm" class="profile-form">
                        <div class="form-group">
                            <label>Describe Your Game & Style of Play *</label>
                            <textarea id="gameDescription" placeholder="Tell coaches about your playing style, strengths, and what makes you unique..." required rows="6"></textarea>
                        </div>

                        <div class="form-group">
                            <label>What Type of Coach/Program Are You Looking For? *</label>
                            <textarea id="coachType" placeholder="Describe your ideal program, coaching style, academic environment, etc..." required rows="6"></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary">Save Game Description</button>
                    </form>
                </div>

                <!-- Contact Information -->
                <div class="profile-card">
                    <h2>Contact Information</h2>
                    <form id="contactForm" class="profile-form">
                        <div class="form-group">
                            <label>Player Email *</label>
                            <input type="email" id="playerEmail" required>
                        </div>

                        <div class="form-group">
                            <label>Player Phone *</label>
                            <input type="tel" id="playerPhone" required>
                        </div>

                        <div class="form-group">
                            <label>Parent/Guardian Name</label>
                            <input type="text" id="parentName">
                        </div>

                        <div class="form-group">
                            <label>Parent/Guardian Email</label>
                            <input type="email" id="parentEmail">
                        </div>

                        <div class="form-group">
                            <label>Parent/Guardian Phone</label>
                            <input type="tel" id="parentPhone">
                        </div>

                        <button type="submit" class="btn btn-primary">Save Contact Info</button>
                    </form>
                </div>

                <!-- Highlight Reels -->
                <div class="profile-card">
                    <h2>Highlight Reels</h2>
                    <p class="highlight-limit" id="highlightLimit">You can upload up to 2 highlight reels with your current plan.</p>

                    <div id="highlightsContainer" class="highlights-container">
                        <!-- Populated by JavaScript -->
                    </div>

                    <button class="btn btn-secondary" id="addHighlightBtn">+ Add Highlight Reel</button>
                </div>
            </div>
        </div>
    </section>

    <!-- Modals -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
